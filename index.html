<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struk Digital Pro - it.barokah.net</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        #it-barokah-app { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .font-mono-receipt { font-family: 'JetBrains Mono', monospace; }
        
        /* Watermark Styles */
        .watermark-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg);
            white-space: nowrap; pointer-events: none; z-index: 0;
            font-size: 5rem; font-weight: 800; text-transform: uppercase;
            color: rgba(0,0,0,0.1); transition: color 0.2s;
        }

        /* Stempel Basah Effect */
        #stempel-img {
            position: absolute; bottom: 15px; right: 25px;
            width: 120px; height: auto; opacity: 0.85;
            mix-blend-mode: multiply; transform: rotate(-15deg);
            pointer-events: none; display: none;
        }

        /* Paper Sizes */
        .paper-80mm { width: 80mm; min-height: 120mm; }
        .paper-58mm { width: 58mm; min-height: 100mm; }
        .paper-a4 { width: 210mm; min-height: 297mm; }

        @media print {
            .no-print { display: none !important; }
            body, #it-barokah-app { background: white !important; padding: 0; margin: 0; }
            #receipt-container { box-shadow: none !important; border: none !important; margin: 0 auto !important; transform: none !important; }
            #stempel-img { display: block; }
        }
    </style>
</head>
<body class="antialiased">

<div id="it-barokah-app" class="min-h-screen">
    <nav class="no-print bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-1.5 rounded-lg text-white font-bold">B</div>
                <span class="font-black text-slate-800 text-lg">it.barokah<span class="text-blue-600">.net</span></span>
            </div>
            <div class="flex gap-3">
                <button onclick="window.downloadReceipt()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-xl text-sm font-bold transition shadow-lg shadow-emerald-100">Simpan PNG</button>
                <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-sm font-bold transition shadow-lg shadow-blue-100">Cetak Struk</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto w-full p-4 lg:p-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <aside class="no-print lg:col-span-5 space-y-6">
                <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 space-y-5">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-[0.2em]">Konfigurasi Nota</h2>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Nomor Nota</label>
                            <input type="text" id="in-nota" oninput="window.liveSync()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Lokasi (Kota)</label>
                            <input type="text" id="in-alamat" oninput="window.liveSync()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>

                    <div class="space-y-3">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Nama Usaha / PT</label>
                            <input type="text" id="in-usaha" oninput="window.liveSync()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Nama Pemilik (TTD)</label>
                                <input type="text" id="in-pemilik" oninput="window.liveSync()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm outline-none">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Tanggal</label>
                                <input type="date" id="in-tanggal" oninput="window.liveSync()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm outline-none">
                            </div>
                        </div>
                    </div>

                    <div class="space-y-3 pt-4 border-t border-slate-100">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Nama Pelanggan</label>
                            <input type="text" id="in-nama" oninput="window.liveSync()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm outline-none" placeholder="Contoh: Puskesmas Sampanahan">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Jenis Layanan</label>
                                <input type="text" id="in-paket" oninput="window.liveSync()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm outline-none" placeholder="Internet BOK">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Total Tagihan (Rp)</label>
                                <input type="number" id="in-harga" oninput="window.liveSync()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm outline-none">
                            </div>
                        </div>
                    </div>

                    <div class="space-y-3 pt-4 border-t border-slate-100">
                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Teks Watermark</label>
                                <input type="text" id="in-watermark" oninput="window.liveSync()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm outline-none">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Ukuran Kertas</label>
                                <select onchange="window.setPaper(this.value)" class="w-full bg-slate-100 border-none rounded-xl p-2.5 text-xs font-bold text-slate-700 outline-none">
                                    <option value="paper-80mm">Thermal 80mm</option>
                                    <option value="paper-58mm">Thermal 58mm</option>
                                    <option value="paper-a4">Kertas A4 (SPJ)</option>
                                </select>
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Transparansi Watermark</label>
                            <input type="range" min="0" max="40" value="10" oninput="window.adjustWM(this.value)" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                        </div>
                    </div>

                    <div class="p-4 border-2 border-dashed border-blue-100 rounded-2xl bg-blue-50/30">
                        <label class="text-[10px] font-bold text-blue-600 uppercase block mb-2 text-center">Upload Stempel PNG (Transparan)</label>
                        <input type="file" id="in-stempel" accept="image/*" onchange="window.handleStempel(this)" class="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-600 file:text-white">
                    </div>
                </div>
            </aside>

            <section class="lg:col-span-7 flex flex-col items-center justify-start min-h-[800px]">
                <div id="receipt-container" class="bg-white p-8 shadow-2xl relative overflow-hidden border-t-8 border-blue-600 transition-all paper-80mm">
                    <div id="out-watermark" class="watermark-text"></div>
                    
                    <div class="relative z-10 font-mono-receipt text-[13px] text-slate-900" id="receipt-content">
                        <div class="text-center mb-8">
                            <h2 id="out-usaha" class="text-xl font-black uppercase leading-tight"></h2>
                            <p class="text-[9px] text-slate-400 tracking-[0.3em] uppercase mt-1">Bukti Pembayaran Resmi</p>
                            <div class="border-b border-dashed border-slate-300 my-4"></div>
                        </div>

                        <div class="space-y-3">
                            <div class="flex justify-between border-b border-slate-50 pb-1">
                                <span class="text-slate-400 text-[10px]">NOMOR NOTA</span>
                                <span id="out-nota" class="font-bold text-[11px]"></span>
                            </div>
                            <div class="flex justify-between border-b border-slate-50 pb-1">
                                <span class="text-slate-400 text-[10px]">PELANGGAN</span>
                                <span id="out-nama" class="font-bold uppercase text-right"></span>
                            </div>
                            <div class="flex justify-between border-b border-slate-50 pb-1">
                                <span class="text-slate-400 text-[10px]">LAYANAN</span>
                                <span id="out-paket" class="font-bold uppercase text-right"></span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-slate-400 text-[10px]">STATUS</span>
                                <span class="text-emerald-600 font-black italic">LUNAS</span>
                            </div>

                            <div class="mt-8 pt-4 border-t-2 border-double border-slate-200">
                                <div class="flex justify-between items-end">
                                    <span class="text-[10px] font-bold text-slate-400 uppercase">TOTAL DIBAYAR</span>
                                    <span id="out-harga" class="text-xl font-black text-blue-700"></span>
                                </div>
                            </div>
                        </div>

                        <div class="mt-12 flex justify-end relative">
                            <div class="text-center min-w-[160px] relative">
                                <p id="out-lokasi-tgl" class="text-[10px] text-slate-800 mb-1 font-medium text-right"></p>
                                <p class="text-[10px] text-slate-400 mb-12 uppercase tracking-widest">Hormat Kami,</p>
                                
                                <img id="stempel-img" src="" alt="Stempel">
                                
                                <div class="border-b border-slate-300 w-full mb-1"></div>
                                <p id="out-pemilik" class="text-[11px] font-bold italic uppercase"></p>
                            </div>
                        </div>

                        <div class="mt-10 text-center border-t border-slate-100 pt-4">
                            <p class="text-[8px] text-slate-400 leading-relaxed uppercase italic">
                                Dokumen ini dihasilkan secara otomatis oleh sistem it.barokah.net<br>
                                Berlaku sebagai bukti pembayaran sah untuk keperluan SPJ BOK
                            </p>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
</div>

<script type="text/javascript">
(function() {
    // Inisialisasi Data Default
    const today = new Date().toISOString().split('T')[0];
    
    window.onload = function() {
        // Konfigurasi Standar it.barokah.net
        document.getElementById('in-tanggal').value = today;
        document.getElementById('in-usaha').value = "it.barokah.net";
        document.getElementById('in-pemilik').value = "Adi Purnomo";
        document.getElementById('in-alamat').value = "Sampanahan Hilir";
        document.getElementById('in-watermark').value = "LUNAS";
        
        // Penomoran Nota Otomatis
        const m = new Date().getMonth() + 1;
        const y = new Date().getFullYear();
        document.getElementById('in-nota').value = `001/BN/${m}/${y}`;
        
        window.liveSync();
    };

    // Fungsi Simpan sebagai Gambar
    window.downloadReceipt = function() {
        const container = document.getElementById('receipt-container');
        const nama = document.getElementById('in-nama').value || 'Nota';
        
        html2canvas(container, { 
            scale: 3, 
            backgroundColor: "#ffffff",
            logging: false,
            useCORS: true
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Struk-${nama.replace(/\s+/g, '-')}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    };

    // Sinkronisasi Live
    window.liveSync = function() {
        const data = {
            nota: document.getElementById('in-nota').value || "---",
            usaha: document.getElementById('in-usaha').value || "it.barokah.net",
            alamat: document.getElementById('in-alamat').value || "Sampanahan Hilir",
            pemilik: document.getElementById('in-pemilik').value || "ADI PURNOMO",
            nama: document.getElementById('in-nama').value || "---",
            paket: document.getElementById('in-paket').value || "---",
            harga: document.getElementById('in-harga').value || 0,
            tgl: document.getElementById('in-tanggal').value || today,
            wm: document.getElementById('in-watermark').value || ""
        };

        const fTgl = new Date(data.tgl).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        
        document.getElementById('out-nota').innerText = data.nota;
        document.getElementById('out-usaha').innerText = data.usaha.toUpperCase();
        document.getElementById('out-nama').innerText = data.nama;
        document.getElementById('out-paket').innerText = data.paket;
        document.getElementById('out-pemilik').innerText = data.pemilik.toUpperCase();
        document.getElementById('out-watermark').innerText = data.wm;
        document.getElementById('out-lokasi-tgl').innerText = `${data.alamat}, ${fTgl}`;
        
        const fmt = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(data.harga);
        document.getElementById('out-harga').innerText = fmt;
    };

    window.adjustWM = (val) => {
        document.getElementById('out-watermark').style.color = `rgba(0,0,0,${val/100})`;
    };

    window.handleStempel = function(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('stempel-img');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    };

    window.setPaper = (size) => {
        const container = document.getElementById('receipt-container');
        container.className = "bg-white p-8 shadow-2xl relative overflow-hidden border-t-8 border-blue-600 transition-all " + size;
    };
})();
</script>
</body>
</html>
